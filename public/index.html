<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수학 기출분석 & 문제 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3354;
    --accent:#4f8ef7;--accent2:#a78bfa;--accent3:#34d399;--warn:#f59e0b;
    --danger:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}
  header{background:linear-gradient(135deg,#0f1117 0%,#1a1d27 50%,#1e1b3a 100%);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
  .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:white;flex-shrink:0;}
  header h1{font-size:18px;font-weight:700;}
  header p{font-size:12px;color:var(--text3);}
  .header-badge{margin-left:auto;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;}
  .layout{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 85px);}
  .left-panel{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px;}
  .section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
  .tabs{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:4px;gap:2px;}
  .tab{flex:1;padding:8px 6px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;}
  .tab.active{background:var(--accent);color:white;}
  label{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:6px;}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:10px 12px;outline:none;transition:border-color 0.2s;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}
  select option{background:var(--surface2);}
  textarea{resize:vertical;min-height:80px;}
  .form-row{margin-bottom:14px;}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--surface2);}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(79,142,247,0.05);}
  .upload-icon{font-size:32px;margin-bottom:8px;}
  .upload-zone p{font-size:12px;color:var(--text3);}
  .upload-zone strong{color:var(--accent);}
  #fileInput{display:none;}
  .file-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
  .file-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:12px;}
  .file-item .file-name{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .file-item .remove-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;}
  .num-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
  .num-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center;}
  .num-box label{font-size:10px;color:var(--text3);margin-bottom:4px;}
  .num-box input{text-align:center;padding:4px;font-weight:700;font-size:16px;color:var(--accent);background:transparent;border:none;}
  .check-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .check-item{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px;transition:all 0.2s;user-select:none;}
  .check-item input{width:auto;display:none;}
  .check-item.checked{background:rgba(79,142,247,0.15);border-color:var(--accent);color:var(--accent);}
  .btn{width:100%;padding:14px;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;}
  .btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);margin-top:8px;}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
  .right-panel{background:var(--bg);overflow-y:auto;padding:32px;display:flex;flex-direction:column;gap:20px;}
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center;gap:16px;}
  .welcome-icon{font-size:64px;}
  .welcome h2{font-size:22px;font-weight:700;}
  .welcome p{font-size:14px;color:var(--text3);max-width:420px;}
  .flow-steps{display:flex;gap:12px;margin-top:8px;}
  .flow-step{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;text-align:center;font-size:12px;}
  .flow-step .step-num{width:24px;height:24px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;margin:0 auto 8px;}
  .loading-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center;}
  .spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-step{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);padding:4px 0;justify-content:center;}
  .loading-step.active{color:var(--accent);}
  .loading-step.done{color:var(--accent3);}
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .result-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .result-header h3{font-size:15px;font-weight:700;flex:1;}
  .result-body{padding:20px;font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap;word-break:break-word;}
  .copy-btn{padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;}
  .copy-btn:hover{border-color:var(--accent3);color:var(--accent3);}
  /* PDF 버튼 */
  .pdf-btn{padding:8px 16px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;}
  .pdf-btn:hover{filter:brightness(1.1);}
  .pdf-exam{background:var(--accent);color:white;}
  .pdf-ans{background:var(--accent2);color:white;}
  .pdf-both{background:linear-gradient(90deg,var(--accent),var(--accent2));color:white;}
  /* API bar */
  .api-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:12px;}
  .api-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);flex-shrink:0;}
  .api-dot.ok{background:var(--accent3);}
  .api-bar input{border:none;background:transparent;padding:0;font-size:12px;font-family:'JetBrains Mono',monospace;}
  .divider{height:1px;background:var(--border);}
  .badge-purple{background:rgba(167,139,250,0.15);border:1px solid var(--accent2);color:var(--accent2);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
  .badge-green{background:rgba(52,211,153,0.15);border:1px solid var(--accent3);color:var(--accent3);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<header>
  <div class="logo-icon">∑</div>
  <div>
    <h1>수학 기출분석 & 시험대비 문제 생성기</h1>
    <p>리더스학원 전용 · 기출 업로드 → AI 분석 → 맞춤 문제 생성</p>
  </div>
  <span class="header-badge">AI Powered</span>
</header>

<div class="layout">
  <div class="left-panel">
    <!-- 비밀번호 -->
    <div>
      <div class="section-title">🔑 학원 접속</div>
      <div class="api-bar">
        <div class="api-dot" id="apiDot"></div>
        <input type="password" id="apiKey" placeholder="학원 비밀번호 입력" oninput="checkPw()">
      </div>
    </div>
    <div class="divider"></div>
    <!-- 모드 탭 -->
    <div>
      <div class="section-title">📋 작업 모드</div>
      <div class="tabs">
        <button class="tab active" onclick="switchMode('analyze')">📊 기출 분석</button>
        <button class="tab" onclick="switchMode('generate')">✏️ 문제 생성</button>
        <button class="tab" onclick="switchMode('both')">🔄 분석+생성</button>
      </div>
    </div>
    <div class="divider"></div>
    <!-- 학교/범위 -->
    <div>
      <div class="section-title">🏫 학교 · 범위 정보</div>
      <div class="form-row">
        <label>학교</label>
        <select id="school" onchange="toggleCustom()">
          <option value="심석고">심석고등학교</option>
          <option value="마석고">마석고등학교</option>
          <option value="심석중">심석중학교</option>
          <option value="화도중">화도중학교</option>
          <option value="직접입력">직접 입력</option>
        </select>
      </div>
      <div class="form-row" id="customSchool" style="display:none">
        <label>학교명 직접 입력</label>
        <input type="text" id="schoolCustom" placeholder="학교명 입력">
      </div>
      <div class="form-row-2">
        <div>
          <label>학년</label>
          <select id="grade">
            <option>중1</option><option>중2</option><option>중3</option>
            <option selected>고1</option><option>고2</option><option>고3</option>
          </select>
        </div>
        <div>
          <label>시험 종류</label>
          <select id="examType">
            <option>1학기 중간</option><option>1학기 기말</option>
            <option>2학기 중간</option><option>2학기 기말</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>과목</label>
        <select id="subject">
          <optgroup label="공통 (고1)">
            <option>공통수학1</option><option>공통수학2</option>
          </optgroup>
          <optgroup label="일반 선택 (고2~3)">
            <option>대수</option><option>미적분 I</option><option>확률과 통계</option>
          </optgroup>
          <optgroup label="진로 선택 (고2~3)">
            <option>미적분 II</option><option>기하</option><option>경제 수학</option>
            <option>인공지능 수학</option>
          </optgroup>
          <optgroup label="중학교">
            <option>중학수학 1학년</option><option>중학수학 2학년</option><option>중학수학 3학년</option>
          </optgroup>
          <optgroup label="2015 개정 (고3)">
            <option>수학 I</option><option>수학 II</option><option>미적분 (2015)</option>
            <option>확률과 통계 (2015)</option><option>기하 (2015)</option>
          </optgroup>
        </select>
      </div>
      <div class="form-row">
        <label>출제 범위</label>
        <input type="text" id="range" placeholder="예) 삼각함수, 수열, 수학적귀납법">
      </div>
    </div>
    <div class="divider"></div>
    <!-- 파일 업로드 -->
    <div id="uploadSection">
      <div class="section-title">📎 기출 파일 업로드</div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
           ondragover="handleDrag(event)" ondrop="handleDrop(event)" ondragleave="handleDragLeave()">
        <div class="upload-icon">📄</div>
        <p><strong>클릭하거나 드래그</strong>하세요</p>
        <p>PDF · JPG · PNG 지원</p>
      </div>
      <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" multiple onchange="handleFiles(this.files)">
      <div class="file-list" id="fileList"></div>
    </div>
    <div class="divider"></div>
    <!-- 문제 구성 -->
    <div id="configSection" style="display:none">
      <div class="section-title">⚙️ 문제 구성</div>
      <div class="num-row">
        <div class="num-box"><label>객관식</label><input type="number" id="mcCount" value="15" min="0" max="30"></div>
        <div class="num-box"><label>서술형</label><input type="number" id="saCount" value="5" min="0" max="20"></div>
        <div class="num-box"><label>총점</label><input type="number" id="totalScore" value="100" min="50" max="200"></div>
      </div>
      <div class="form-row">
        <label>난이도</label>
        <select id="difficulty">
          <option>균형형 (하30% 중50% 상20%)</option>
          <option>고난도 (1등급 변별)</option>
          <option>기본형 (개념 확인 중심)</option>
          <option>내신 실전형</option>
        </select>
      </div>
      <label style="margin-bottom:8px">문제 유형</label>
      <div class="check-group" id="typeGroup">
        <label class="check-item checked"><input type="checkbox" value="계산" checked> 계산</label>
        <label class="check-item checked"><input type="checkbox" value="개념이해" checked> 개념이해</label>
        <label class="check-item checked"><input type="checkbox" value="활용·문장제" checked> 활용·문장제</label>
        <label class="check-item"><input type="checkbox" value="그래프·도형"> 그래프·도형</label>
        <label class="check-item"><input type="checkbox" value="증명"> 증명</label>
        <label class="check-item"><input type="checkbox" value="창의·융합"> 창의·융합</label>
      </div>
      <div class="form-row">
        <label>출판사 (선택)</label>
        <input type="text" id="publisher" placeholder="예) 미래엔, 비상, 천재교육">
      </div>
      <div class="form-row">
        <label>추가 요구사항</label>
        <textarea id="extraReq" placeholder="예) 킬러 문제 2개, 교과서 예제 변형 위주" rows="3"></textarea>
      </div>
    </div>
    <button class="btn btn-primary" id="mainBtn" onclick="runMain()">🚀 AI 분석 시작</button>
    <button class="btn btn-secondary" onclick="copyPrompt()">📋 프롬프트만 복사</button>
  </div>

  <!-- 오른쪽 패널 -->
  <div class="right-panel" id="rightPanel">
    <div class="welcome" id="welcomeBox">
      <div class="welcome-icon">📐</div>
      <h2>수학 기출분석 & 문제 생성 도구</h2>
      <p>왼쪽 패널에서 학교·범위를 입력하고 시작하세요.<br>비밀번호 입력 후 AI 분석 시작을 누르세요.</p>
      <div class="flow-steps">
        <div class="flow-step"><div class="step-num">1</div>학교·범위<br>입력</div>
        <div class="flow-step"><div class="step-num">2</div>기출 파일<br>업로드</div>
        <div class="flow-step"><div class="step-num">3</div>AI 분석·<br>문제 생성</div>
        <div class="flow-step"><div class="step-num">4</div>PDF<br>다운로드</div>
      </div>
    </div>
  </div>
</div>

<script>
let currentMode = 'analyze';
let uploadedFiles = [];
let lastResult = '';
let lastInfo = {};

function checkPw() {
  const v = document.getElementById('apiKey').value.trim();
  document.getElementById('apiDot').classList.toggle('ok', v.length > 3);
}

function toggleCustom() {
  document.getElementById('customSchool').style.display =
    document.getElementById('school').value === '직접입력' ? 'block' : 'none';
}

document.querySelectorAll('.check-item').forEach(item => {
  item.addEventListener('click', () => {
    const cb = item.querySelector('input');
    cb.checked = !cb.checked;
    item.classList.toggle('checked', cb.checked);
  });
});

function switchMode(m) {
  currentMode = m;
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['analyze','generate','both'][i] === m));
  document.getElementById('uploadSection').style.display = m === 'generate' ? 'none' : 'block';
  document.getElementById('configSection').style.display = m === 'analyze' ? 'none' : 'block';
  const labels = {analyze:'기출 분석 시작', generate:'문제 생성', both:'분석 후 문제 생성'};
  document.getElementById('mainBtn').textContent = '🚀 ' + labels[m];
}

function handleDrag(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('drag'); }
function handleDragLeave() { document.getElementById('uploadZone').classList.remove('drag'); }
function handleDrop(e) {
  e.preventDefault(); document.getElementById('uploadZone').classList.remove('drag');
  handleFiles(e.dataTransfer.files);
}
function handleFiles(files) {
  [...files].forEach(f => { if (!uploadedFiles.find(x=>x.name===f.name)) uploadedFiles.push(f); });
  renderFileList();
}
function renderFileList() {
  document.getElementById('fileList').innerHTML = uploadedFiles.map((f,i) => `
    <div class="file-item">
      <span>${f.type.includes('pdf')? '📄':'🖼️'}</span>
      <span class="file-name">${f.name}</span>
      <button class="remove-btn" onclick="removeFile(${i})">✕</button>
    </div>`).join('');
}
function removeFile(i) { uploadedFiles.splice(i,1); renderFileList(); }

function getInfo() {
  const school = document.getElementById('school').value === '직접입력'
    ? document.getElementById('schoolCustom').value
    : document.getElementById('school').value;
  return {
    school, grade: document.getElementById('grade').value,
    examType: document.getElementById('examType').value,
    subject: document.getElementById('subject').value,
    range: document.getElementById('range').value || '전 범위',
    mc: document.getElementById('mcCount').value,
    sa: document.getElementById('saCount').value,
    total: document.getElementById('totalScore').value,
    diff: document.getElementById('difficulty').value,
    types: [...document.querySelectorAll('.check-item.checked input')].map(x=>x.value).join(', '),
    publisher: document.getElementById('publisher').value,
    extra: document.getElementById('extraReq').value
  };
}

function buildPrompt(info) {
  const fileNote = uploadedFiles.length
    ? `\n첨부 기출 파일: ${uploadedFiles.map(f=>f.name).join(', ')}\n기출 파일을 분석하여 출제 유형·배점 패턴을 정리해주세요.\n` : '';

  if (currentMode === 'analyze') {
    return `당신은 수학 내신 전문 출제 분석가입니다.
[분석 대상]
• 학교: ${info.school} ${info.grade} / 시험: ${info.examType} / 과목: ${info.subject}
• 범위: ${info.range}
${fileNote}
다음을 분석해주세요:
1. 출제 유형 분석표 (문항번호|유형|배점|난이도|핵심개념)
2. 배점 구조 분석
3. 자주 출제 핵심 개념 TOP 5
4. 서술형 출제 형식 분석
5. 시험대비 전략

async function runMain() {
  const password = document.getElementById('apiKey').value.trim();
  if (!password) { alert('학원 비밀번호를 입력해주세요.'); return; }

  const info = getInfo();
  lastInfo = info;
  showLoading();

  try {
    let res;
    if (uploadedFiles.length > 0) {
      const formData = new FormData();
      formData.append('password', password);
      formData.append('prompt', buildPrompt(info));
      uploadedFiles.forEach(f => formData.append('files', f));
      res = await fetch('/api/generate-with-files', { method:'POST', body: formData });
    } else {
      res = await fetch('/api/generate', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ password, prompt: buildPrompt(info) })
      });
    }

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'HTTP ' + res.status);
    }
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '알 수 없는 오류');
    lastResult = data.result;
    showResult(data.result, info);
  } catch(e) {
    showError(e.message);
  }
}

// ── PDF 인쇄 (window.print 방식) ──
function mdToHtml(text) {
  // 수식 보호 ($ 구간 먼저 추출)
  const mathBlocks = [];
  text = text.replace(/\$\$[\s\S]*?\$\$|\$[^$\n]+?\$/g, m => {
    mathBlocks.push(m);
    return `%%MATH${mathBlocks.length-1}%%`;
  });

  // 마크다운 변환
  // 헤더
  text = text.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // 굵게/기울임
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // 수평선
  text = text.replace(/^---+$/gm, '<hr>');
  // 표 변환
  text = text.replace(/(\|.+\|\n)((?:\|[-:| ]+\|\n)?)((?:\|.+\|\n?)*)/g, (match, header, sep, body) => {
    const parseRow = row => row.trim().split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>`<td>${c.trim()}</td>`).join('');
    const parseHeader = row => row.trim().split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>`<th>${c.trim()}</th>`).join('');
    const hRow = `<tr>${parseHeader(header)}</tr>`;
    const bRows = body.trim().split('\n').filter(r=>r.trim()).map(r=>`<tr>${parseRow(r)}</tr>`).join('');
    return `<table><thead>${hRow}</thead><tbody>${bRows}</tbody></table>`;
  });
  // 리스트
  text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // 인용
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // 줄바꿈
  text = text.replace(/\n\n/g, '</p><p>');
  text = '<p>' + text + '</p>';
  text = text.replace(/<p>\s*(<h[1-6]|<ul|<table|<hr|<blockquote)/g, '$1');
  text = text.replace(/(<\/h[1-6]>|<\/ul>|<\/table>|<hr>|<\/blockquote>)\s*<\/p>/g, '$1');

  // 수식 복원
  text = text.replace(/%%MATH(\d+)%%/g, (_, i) => mathBlocks[parseInt(i)]);
  return text;
}

function buildExamSheet(raw, info, today) {
  const lines = raw.split('\n');
  let html = '';
  let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim();
    // 문항 시작
    const qMatch = line.match(/^▣\s*(\d+)\.\s*(?:\(([^)]+)\))?\s*(.*)$/);
    if (qMatch) {
      const num = qMatch[1];
      const type = qMatch[2] || '';
      const rest = qMatch[3];
      const metaMatch = rest.match(/\[배점[:\s]*([^\]]+)\]|\[유형[:\s]*([^\]]+)\]|\[난이도[:\s]*([^\]]+)\]/g);
      const metas = metaMatch ? metaMatch.map(m=>`<span class="q-meta">${m.replace(/[\[\]]/g,'')}</span>`).join('') : '';
      const typeTag = type ? `<span class="q-type">${type}</span>` : '';
      const bodyText = rest.replace(/\[배점[^\]]*\]|\[유형[^\]]*\]|\[난이도[^\]]*\]/g,'').trim();
      html += `<div class="q-block">`;
      html += `<div class="q-header"><span class="q-num">${num}.</span>${typeTag}${metas}</div>`;
      if (bodyText) html += `<div class="q-body">${bodyText}</div>`;
      // 다음 줄들 (문제 본문 + 선지)
      i++;
      let choices = [];
      while (i < lines.length) {
        const l = lines[i].trim();
        if (/^▣/.test(l) || /^▶/.test(l) || /^===/.test(l)) break;
        if (/^[①②③④⑤]/.test(l)) {
          choices.push(l);
        } else {
          if (choices.length > 0) {
            html += `<div class="choices">${choices.map(c=>`<div class="choice">${c}</div>`).join('')}</div>`;
            choices = [];
          }
          if (l) html += `<div class="q-body">${l}</div>`;
        }
        i++;
      }
      if (choices.length > 0) {
        html += `<div class="choices">${choices.map(c=>`<div class="choice">${c}</div>`).join('')}</div>`;
      }
      html += `</div>`;
      continue;
    }
    // 서술형
    const saMatch = line.match(/^▣\s*(?:\(서술형\))?\s*(\d+)?\s*\[배점[:\s]*([^\]]+)\]/);
    if (saMatch || /^▣\s*\(서술형\)/.test(line)) {
      const scoreMatch = line.match(/\[배점[:\s]*([^\]]+)\]/);
      const score = scoreMatch ? scoreMatch[1] : '';
      html += `<div class="q-block subj-block">`;
      html += `<div class="q-header"><span class="q-type-subj">서술형</span>${score?`<span class="q-meta">배점: ${score}</span>`:''}</div>`;
      i++;
      while (i < lines.length) {
        const l = lines[i].trim();
        if (/^▣/.test(l) || /^▶/.test(l) || /^===/.test(l)) break;
        if (l) html += `<div class="q-body">${l}</div>`;
        i++;
      }
      html += `<div class="subj-answer-space"></div></div>`;
      continue;
    }
    if (line) html += `<div class="q-body" style="margin-left:0">${line}</div>`;
    i++;
  }
  return html;
}

function buildAnswerSheet(raw, info, today) {
  // 마크다운 변환 후 해설 블록 파싱
  const lines = raw.split('\n');
  let html = '';
  let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim();
    // 정답 블록
    const ansMatch = line.match(/^▶\s*(\d+)번\s*정답[:\s]*(.+)/);
    if (ansMatch) {
      const num = ansMatch[1];
      const ans = ansMatch[2];
      html += `<div class="ans-block">`;
      html += `<div class="ans-header"><span class="ans-num">${num}번</span><span class="ans-answer">✅ 정답: ${ans}</span></div>`;
      i++;
      let explain = '';
      while (i < lines.length) {
        const l = lines[i].trim();
        if (/^▶/.test(l) || /^===/.test(l)) break;
        explain += l + '\n';
        i++;
      }
      html += `<div class="ans-explain">${mdToHtml(explain)}</div>`;
      html += `</div>`;
      continue;
    }
    if (line) html += `<p>${mdToHtml(line)}</p>`;
    i++;
  }
  return html || mdToHtml(raw);
}

function buildPrintPage(raw, info, today, isAnswer) {
  const hasStructure = /===EXAM_START===|===ANSWER_START===|▣\s*\d+\.|▶\s*\d+번/.test(raw);
  const mc = info.mc || 15;
  const sa = info.sa || 5;
  const total = info.total || 100;

  if (isAnswer) {
    return `<div class="page">
      <div class="exam-header">
        <div class="school-name">${info.school.replace(/등학교|중학교|고등학교|중학교/,'').split('').join(' ')}</div>
        <div class="exam-title">${info.grade} ${info.examType} | ${info.subject} 해설지 (교사용)</div>
      </div>
      <div style="background:#fff0f0;border:1.5px solid #dc2626;border-radius:4px;padding:6px 12px;font-size:12px;color:#dc2626;font-weight:700;margin-bottom:16px;text-align:center;">⚠️ 교사용 — 학생 배포 절대 금지</div>
      <div class="ans-body">${buildAnswerSheet(raw, info, today)}</div>
      <div class="footer">© 리더스학원 | 심석중·고 맞은편 2층 ☎ 031-511-0984 | 본 시험지의 저작권은 리더스학원에 있습니다. | 출제일: ${today}</div>
    </div>`;
  }

  const hasExamStructure = /▣\s*\d+\./.test(raw);

  if (hasExamStructure) {
    // 문제 생성 모드 - 시험지 레이아웃
    const mcSection = `<div class="section-bar">▣ 객관식 (1~${mc}번) &nbsp; 각 문항 배점 확인 &nbsp; 총 ${Math.round(total*0.6)}점</div>`;
    const saSection = `<div class="section-bar">▣ 서술형 (${parseInt(mc)+1}~${parseInt(mc)+parseInt(sa)}번) &nbsp; 총 ${Math.round(total*0.4)}점</div>`;

    return `<div class="page">
      <div class="exam-header">
        <div class="school-name">${info.school.split('').join(' ')}</div>
        <div class="exam-title">${info.grade} ${info.examType} | ${info.subject}</div>
      </div>
      <div class="info-row">
        <div class="info-cell"><div class="label">시험일시</div>2025년 &nbsp;&nbsp; 월 &nbsp;&nbsp; 일</div>
        <div class="info-cell"><div class="label">학년/반/번호</div>${info.grade} &nbsp;&nbsp; 반 &nbsp;&nbsp; 번</div>
        <div class="info-cell"><div class="label">이름 / 점수</div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; / ${total}점</div>
      </div>
      <div class="caution">
        <strong>※ 유의사항</strong>
        <ol>
          <li>답안지에 학년·반·번호·성명을 정확히 기입하시오.</li>
          <li>객관식 문항은 가장 적절한 답 하나를 고르시오.</li>
          <li>서술형은 반드시 풀이 과정을 단계별로 작성하시오. 풀이 없는 정답은 0점 처리됩니다.</li>
          <li>계산기 사용 불가. 시험 범위: ${info.range}</li>
        </ol>
      </div>
      ${mcSection}
      ${buildExamSheet(raw, info, today)}
      <div class="footer">© 리더스학원 | 심석중·고 맞은편 2층 ☎ 031-511-0984 | 무단 복제·배포·전송 금지 | 출제일: ${today}</div>
    </div>`;
  }

  // 분석 모드 - 마크다운 변환
  return `<div class="page">
    <div class="exam-header">
      <div class="school-name">${info.school.split('').join(' ')}</div>
      <div class="exam-title">${info.grade} ${info.examType} | ${info.subject} 기출 분석 보고서</div>
    </div>
    <div class="content">${mdToHtml(raw)}</div>
    <div class="footer">© 리더스학원 | 심석중·고 맞은편 2층 ☎ 031-511-0984 | 출제일: ${today}</div>
  </div>`;
}

// init
switchMode('analyze');

</script>
</body>
